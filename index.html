<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zohreh Razavi | Portfolio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/a076d05399.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #fdf2f4;
        display: flex;
        flex-direction: row;
        min-height: 100vh;
        flex-wrap: wrap;
      }

      /* LEFT PANEL */
      .left-panel {
        flex: 1;
        min-width: 300px;
        background-color: #d97683;
        color: #000;
        padding: 4rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
      }

      .left-panel h1 {
        font-family: 'Anton', sans-serif;
        font-size: 16vw;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        text-align: left;
      }

      .left-panel p {
        margin-top: 2rem;
        font-size: 1.5vw;
        font-weight: 400;
      }

      /* RIGHT PANEL */
      .right-panel {
        flex: 1;
        min-width: 300px;
        background-color: #fff0f1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 2rem;
      }

      .circle-menu {
        position: relative;
        width: 520px;
        height: 520px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .center-avatar {
        width: 260px;
        height: 260px;
        border-radius: 50%;
        border: 6px solid white;
        object-fit: cover;
        z-index: 2;
      }

      .circle-button {
        position: absolute;
        width: 270px;
        height: 270px;
        border-radius: 50%;
        background-color: #d97683;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(var(--angle)) translate(230px);
        transition: transform 0.3s ease, background-color 0.3s ease;
        cursor: pointer;
        z-index: 1;
      }

      .circle-button span {
        display: block;
        transform: rotate(calc(-1 * var(--angle)));
        color: white;
        font-size: 1.4rem;
        text-align: center;
        max-width: 100px;
        pointer-events: none;
        line-height: 1.2;
      }

      .circle-button:hover {
        background-color: #bb5e6c;
        transform: rotate(var(--angle)) translate(230px) scale(1.1);
      }

      /* MOBILE */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .left-panel {
          width: 100%;
          padding: 2rem 1rem;
          text-align: center;
          align-items: center;
          justify-content: center;
        }

        .left-panel h1 {
          font-size: 30vw;
          line-height: 1;
          text-align: center;
        }

        .left-panel p {
          margin-top: 1rem;
          font-size: 4vw;
          text-align: center;
        }
        .right-panel {
          padding: 1rem 0;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 50vh;
        }

        .circle-menu {
          width: 320px;
          height: 320px;
        }

        .center-avatar {
          width: 160px;
          height: 160px;
        }

        .circle-button {
          width: 120px;
          height: 120px;
          transform: rotate(var(--angle)) translate(115px);
        }

        .circle-button span {
          font-size: 0.85rem;
          max-width: 60px;
        }

        .circle-button:hover {
          transform: rotate(var(--angle)) translate(115px) scale(1.1);
        }
      }
      /* Extra Small Phones (≤ 480px) */
      @media (max-width: 480px) {
        .circle-menu {
          width: 220px;
          height: 220px;
        }

        .center-avatar {
          width: 100px;
          height: 100px;
        }

        .circle-button {
          width: 70px;
          height: 70px;
          transform: rotate(var(--angle)) translate(75px);
        }

        .circle-button span {
          font-size: 0.65rem;
          max-width: 40px;
        }

        .circle-button:hover {
          transform: rotate(var(--angle)) translate(75px) scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <div class="left-panel">
      <h1>
        ZOHREH
        <br />
        RAZAVI
      </h1>
      <p>Software Project Manager — Istanbul, TR</p>
    </div>
    <div class="right-panel">
      <div class="circle-menu">
        <img src="avatar.png" class="center-avatar" alt="Avatar" />
        <div class="circle-button" style="--angle: 0deg;">
          <span>about</span>
        </div>
        <div class="circle-button" style="--angle: 60deg;">
          <span>projects</span>
        </div>
        <div class="circle-button" style="--angle: 120deg;">
          <span>blog</span>
        </div>
        <div class="circle-button" style="--angle: 180deg;">
          <span>resume</span>
        </div>
        <div class="circle-button" style="--angle: 240deg;">
          <span>tools</span>
        </div>
        <div class="circle-button" style="--angle: 300deg;">
          <span>contact</span>
        </div>
      </div>
    </div>
  </body>
</html>
